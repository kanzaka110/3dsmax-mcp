name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true

      - name: Run harness validation
        run: python harness/validate.py

      - name: Run harness tests
        run: python -m pytest tests/test_harness.py -v
